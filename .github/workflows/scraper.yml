name: Job Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Allow manual trigger from the GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Required to commit seen_jobs.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          # Preferred multi-channel mode: set these as repository secrets.
          SWE_WEBHOOK_URL: ${{ secrets.SWE_WEBHOOK_URL }}
          PM_WEBHOOK_URL: ${{ secrets.PM_WEBHOOK_URL }}
          # Advanced multi-channel mode: JSON list, or {"channels": [...]}
          # Ignored when SWE_WEBHOOK_URL or PM_WEBHOOK_URL is present.
          CHANNELS_JSON: ${{ secrets.CHANNELS_JSON }}
          # Single-channel fallback
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Single-channel filtering (optional — falls back to defaults in config.py)
          KEYWORDS: ${{ secrets.KEYWORDS }}
          EXCLUDED_KEYWORDS: ${{ secrets.EXCLUDED_KEYWORDS }}
          LOCATIONS: ${{ secrets.LOCATIONS }}
          MAX_NOTIFICATIONS_PER_RUN: ${{ secrets.MAX_NOTIFICATIONS_PER_RUN }}
          RECENT_POSTING_MAX_AGE_HOURS: ${{ vars.RECENT_POSTING_MAX_AGE_HOURS }}
          ATS_CONCURRENCY: ${{ vars.ATS_CONCURRENCY }}
          # SimplifyJobs (optional — defaults to Summer internships + New Grad)
          SIMPLIFY_URLS: ${{ secrets.SIMPLIFY_URLS }}
          # HackerNews (optional — defaults to 500 comments)
          HN_MAX_COMMENTS: ${{ secrets.HN_MAX_COMMENTS }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
