name: Job Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '7,22,37,52 * * * *'   # Every 15 minutes at off-peak minutes
  workflow_dispatch:           # Allow manual trigger from the GitHub Actions UI

concurrency:
  group: job-scraper-main
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Required to commit seen_jobs.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover ATS companies
        if: ${{ vars.RUN_COMPANY_DISCOVERY == 'true' }}
        env:
          DISCOVERY_SOURCE_URLS: ${{ vars.DISCOVERY_SOURCE_URLS }}
          DISCOVERED_COMPANIES_PATH: ${{ vars.DISCOVERED_COMPANIES_PATH }}
        run: python discover_companies.py

      - name: Run scraper
        env:
          # Preferred multi-channel mode: set these as repository secrets.
          SWE_WEBHOOK_URL: ${{ secrets.SWE_WEBHOOK_URL }}
          PM_WEBHOOK_URL: ${{ secrets.PM_WEBHOOK_URL }}
          # Advanced multi-channel mode: JSON list, or {"channels": [...]}
          # Can add extra channels or override built-in channel names.
          CHANNELS_JSON: ${{ secrets.CHANNELS_JSON }}
          # Single-channel fallback
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Single-channel filtering (optional — falls back to defaults in config.py)
          KEYWORDS: ${{ secrets.KEYWORDS }}
          EXCLUDED_KEYWORDS: ${{ secrets.EXCLUDED_KEYWORDS }}
          LOCATIONS: ${{ secrets.LOCATIONS }}
          MAX_NOTIFICATIONS_PER_RUN: ${{ secrets.MAX_NOTIFICATIONS_PER_RUN }}
          RECENT_POSTING_MAX_AGE_HOURS: ${{ vars.RECENT_POSTING_MAX_AGE_HOURS }}
          ATS_CONCURRENCY: ${{ vars.ATS_CONCURRENCY }}
          SEND_NO_NEW_SUMMARY: ${{ vars.SEND_NO_NEW_SUMMARY }}
          INCLUDE_DISCOVERED_COMPANIES: ${{ vars.INCLUDE_DISCOVERED_COMPANIES }}
          DISCOVERED_COMPANIES_PATH: ${{ vars.DISCOVERED_COMPANIES_PATH }}
          # SimplifyJobs (optional — defaults to Summer internships + New Grad)
          SIMPLIFY_URLS: ${{ secrets.SIMPLIFY_URLS }}
          # HackerNews (optional — defaults to 500 comments)
          HN_MAX_COMMENTS: ${{ secrets.HN_MAX_COMMENTS }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git add discovered_companies.json || true
          git diff --staged --quiet && exit 0
          git commit -m "chore: update seen_jobs [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
